<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リダイレクト中 - DataDoggo テストサイト</title>
    <meta name="description" content="ページをリダイレクトしています">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        h1 {
            margin: 0 0 20px 0;
            font-size: 2.5em;
            font-weight: 300;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #ffffff;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .countdown {
            font-size: 1.5em;
            margin: 20px 0;
            font-weight: bold;
        }
        .info {
            font-size: 1.1em;
            opacity: 0.9;
            margin-top: 20px;
        }
        .progress-bar {
            width: 300px;
            height: 8px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            margin: 20px auto;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #ffffff;
            width: 0%;
            border-radius: 4px;
            animation: progress 3s linear forwards;
        }
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
    <script>
        let countdown = 3;

        function updateCountdown() {
            const countdownElement = document.getElementById('countdown');
            if (countdownElement) {
                countdownElement.textContent = countdown;
            }

            if (countdown <= 0) {
                // plain.htmlにリダイレクト
                window.location.href = 'plain.html';
            } else {
                countdown--;
                setTimeout(updateCountdown, 1000);
            }
        }

        // ページ読み込み完了後にカウントダウン開始
        window.addEventListener('load', function() {
            updateCountdown();
        });

        // テスト用: 手動リダイレクトボタン（3秒より前に実行可能）
        function manualRedirect() {
            window.location.href = 'plain.html';
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>ページを移動中...</h1>

        <div class="spinner"></div>

        <div class="countdown">
            <span id="countdown">3</span>秒後にリダイレクトします
        </div>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <div class="info">
            <p>DataDoggo テストサイトのメインページに移動します</p>
            <p><small>自動で移動しない場合は、<button onclick="manualRedirect()" style="background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 5px 10px; border-radius: 5px; cursor: pointer;">こちらをクリック</button></small></p>
        </div>
    </div>

    <!-- テスト用の隠し要素 -->
    <div id="test-data" style="display: none;">
        <span data-test="redirect-type">javascript</span>
        <span data-test="redirect-delay">3000</span>
        <span data-test="target-url">plain.html</span>
    </div>
</body>
</html>
