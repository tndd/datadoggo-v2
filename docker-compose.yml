name: datadoggo

services:
  # 本番/開発用PostgreSQL（従来の設定を維持）
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: datadoggo
      POSTGRES_USER: datadoggo
      POSTGRES_PASSWORD: datadoggo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U datadoggo" ]
      interval: 5s
      timeout: 3s
      retries: 3

  # テスト用PostgreSQL
  postgres-test:
    image: postgres:16
    environment:
      POSTGRES_DB: datadoggo_test
      POSTGRES_USER: datadoggo
      POSTGRES_PASSWORD: datadoggo
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    ports:
      - "16432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U datadoggo" ]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
  postgres_test_data:
